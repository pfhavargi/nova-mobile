<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Mobile — Phones from Apple, Samsung, Nokia & OnePlus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="shell">
      <a class="brand-wordmark" href="index.html">nova<span>.</span>mobile</a>
      <nav class="main-nav">
        <a href="index.html" class="active">Home</a>
        <a href="#catalog">All Phones</a>
        <a href="#featured">Featured</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="shell">
      <div class="hero-inner" id="hero-content">
        <div class="loading-state">Loading…</div>
      </div>
    </div>
  </section>

  <main class="shell">

    <section class="section" id="featured">
      <div class="section-heading">
        <h2>Featured this week</h2>
      </div>
      <div class="product-grid" id="featured-grid">
        <div class="loading-state">Loading phones…</div>
      </div>
    </section>

    <section class="section" id="catalog">
      <div class="section-heading">
        <h2>All Phones</h2>
        <span class="count" id="catalog-count"></span>
      </div>
      <div class="filter-row" id="filter-row"></div>
      <div class="product-grid" id="catalog-grid">
        <div class="loading-state">Loading phones…</div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="shell">
      Built on Contentstack. Content managed in the Contentstack app, deployed with Launch.
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/contentstack.js"></script>
  <script src="js/personalize.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
